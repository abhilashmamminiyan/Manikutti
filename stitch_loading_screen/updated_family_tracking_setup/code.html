<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Family Dashboard | The Heritage Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#006972",
              "on-surface": "#191c1d",
              "on-primary-container": "#00535b",
              "on-secondary-fixed-variant": "#574500",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "surface-tint": "#006972",
              "on-tertiary-fixed-variant": "#8b0e45",
              "surface-container-highest": "#e1e3e4",
              "surface-container-high": "#e7e8e9",
              "on-secondary-fixed": "#241a00",
              "outline": "#6f797b",
              "error": "#ba1a1a",
              "surface-variant": "#e1e3e4",
              "background": "#f8f9fa",
              "secondary-fixed": "#ffe087",
              "secondary-container": "#fdd34d",
              "on-secondary-container": "#725b00",
              "on-primary": "#ffffff",
              "on-background": "#191c1d",
              "surface-bright": "#f8f9fa",
              "on-secondary": "#ffffff",
              "tertiary-container": "#ff9fba",
              "on-error": "#ffffff",
              "surface-dim": "#d9dadb",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#f3f4f5",
              "primary-fixed": "#92f1fe",
              "surface": "#f8f9fa",
              "tertiary-fixed-dim": "#ffb1c5",
              "on-surface-variant": "#3e484a"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
<div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCPp2jafLLWiAX2y2TFrV6YM3j862qErXQ6t0WOL7a79MPLrDZfatp6v8KOMa0VxRb7Mdoi0pzi86pyjH4fh4dftpGH-mDX5IGfOWZZAIHmekOwmS12xmDBiC_q9hZRUDqSlDvn7Tlepclv0hNZANjeTahO4qqXrk3FkHnQZ7MwEH1Z73qArybJdRBjH8s_RAGg2gDQm3O43W8Rr_82V7aiCacFaEC-RMUlNXK1Yr_f6Z9H40I7naWHZ8b9MjG0X9f5Gj8C89SVih0"/>
</div>
<span class="text-xl font-extrabold text-cyan-800 dark:text-cyan-300 tracking-tight font-headline">The Heritage Ledger</span>
</div>
<div class="flex items-center">
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors duration-200">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="notifications">notifications</span>
</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="pt-24 pb-32 px-6 max-w-7xl mx-auto">
<div class="mt-8 mb-12 max-w-2xl">
<h1 class="text-4xl md:text-5xl font-extrabold text-on-surface leading-tight tracking-tight mb-4">Family Tracking</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-lg">Add Family to track your expense together</p>
</div>
<div class="space-y-6 max-w-md">
<!-- Create Family Button -->
<button class="w-full py-5 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-2xl text-lg shadow-lg shadow-primary/10 flex items-center justify-center gap-3 hover:shadow-xl transition-all active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="add_home">add_home</span>
                Create Family
                <span class="material-symbols-outlined text-sm opacity-60" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative py-4">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-background px-4 text-sm text-on-surface-variant font-medium uppercase tracking-widest">or</span>
</div>
</div>
<!-- Join Family Section -->
<div class="bg-surface-container-low rounded-2xl p-6 border border-outline-variant/20">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-xl bg-secondary-container/30 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="key">key</span>
</div>
<h2 class="text-xl font-bold text-on-surface tracking-tight">Join Family</h2>
</div>
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-2" for="family-code">Family Code</label>
<input class="w-full px-4 py-3 bg-white dark:bg-slate-800 border-outline-variant/50 rounded-xl focus:ring-primary focus:border-primary text-center tracking-widest font-bold uppercase placeholder:tracking-normal placeholder:font-normal placeholder:text-slate-400" id="family-code" placeholder="Enter 6-digit code" type="text"/>
</div>
<button class="w-full py-4 px-6 bg-white dark:bg-slate-700 text-on-surface font-bold rounded-xl text-lg border border-outline-variant/30 flex items-center justify-center gap-2 hover:bg-surface-container-lowest transition-colors shadow-sm">
                        Join Family
                        <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</div>
</div>
</div>
</main>
<!-- Global FAB -->
<div class="fixed bottom-28 right-6 z-50">
<button class="w-14 h-14 rounded-2xl bg-primary text-white shadow-[0_20px_40px_rgba(0,105,114,0.3)] flex items-center justify-center hover:scale-110 transition-transform active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="support_agent">support_agent</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.06)] px-4 pb-6 pt-3 flex justify-around items-center">
<!-- Inactive: Personal -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-cyan-600 dark:hover:text-cyan-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="text-[10px] uppercase tracking-widest font-inter font-bold">Personal</span>
</a>
<!-- Active: Family -->
<a class="flex flex-col items-center justify-center bg-cyan-100/50 dark:bg-cyan-900/30 text-cyan-800 dark:text-cyan-200 rounded-2xl px-6 py-2 transition-all active:scale-90" href="#">
<span class="material-symbols-outlined mb-1" data-icon="family_restroom">family_restroom</span>
<span class="text-[10px] uppercase tracking-widest font-inter font-bold">Family</span>
</a>
<!-- Inactive: Profile -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-6 py-2 hover:text-cyan-600 dark:hover:text-cyan-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="account_circle">account_circle</span>
<span class="text-[10px] uppercase tracking-widest font-inter font-bold">Profile</span>
</a>
</nav>
</body></html>
